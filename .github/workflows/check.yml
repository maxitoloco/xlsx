# Runs on pull requests and master pushes to verify build, tests, lint, and coverage.

name: CI

on:
    pull_request:
        branches:
            - master
        types:
            - opened
            - synchronize
            - reopened
    push:
        branches:
            - master

concurrency:
    group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
    cancel-in-progress: true

jobs:
    test:
        name: Test (Node ${{ matrix.node-version }})
        if: ${{ (github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip ci]')) && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')) }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                node-version: [16, 18, 20]

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

    lint:
        name: Lint
        if: ${{ (github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip ci]')) && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')) }}
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

    coverage:
        name: Coverage
        if: ${{ (github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip ci]')) && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')) }}
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run tests with coverage
              run: npm run test-cov

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage/lcov.info
                  flags: unittests
                  fail_ci_if_error: false
                  token: ${{ secrets.CODECOV_TOKEN }}
